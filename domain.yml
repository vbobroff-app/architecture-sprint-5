version: "3.1"

intents:
  - greet
  - goodbye
  - inform
  - ask_architecture
  - affirm
  - deny
  - request_info
  - ask_microservices_architecture
  - ask_microservice

responses:
  utter_greet:
    - text: "Привет! Чем могу помочь в области архитектуры программного обеспечения?"
  
  utter_goodbye:
    - text: "До свидания! Если появятся вопросы по архитектуре ПО, обращайтесь."
  
  utter_ask_more:
    - text: "Что именно вас интересует в архитектуре программного обеспечения?"
  
  utter_acknowledge:
    - text: "Понял, расскажите подробнее о вашем проекте или задачах."

  utter_architecture_response:
    - text: "Архитектура ПО включает выбор структур, которые обеспечивают масштабируемость, гибкость и поддерживаемость приложения. Задайте конкретный вопрос по этой теме, и я помогу вам с информацией."

  utter_msa_response:
    - text: "Микросервисная архитектура — это метод построения программного обеспечения, при котором программа разбивается на небольшие независимые части, называемые микросервисами. Эти микросервисы работают вместе, чтобы обеспечить функциональность программы."

  utter_microservice_response:
    - text: "Микросервисы — это небольшие независимые компоненты программы, которые выполняют определённые функции. Они могут быть разработаны, развёрнуты и обновлены независимо друг от друга, что упрощает процесс разработки и улучшает гибкость системы."

entities:
  - topic

slots:
  topic:
    type: text
    influence_conversation: false
    mappings:
        - type: from_text

session_config:
  session_expiration_time: 60
  carry_over_slots_to_new_session: true
